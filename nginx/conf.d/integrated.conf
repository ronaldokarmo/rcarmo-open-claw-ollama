# Resolver para Docker DNS (IMPORTANTE!)
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name localhost;

    # Variáveis para upstreams
    set $upstream_ollama "ollama:11434";
    set $upstream_openclaw "localhost:18789";
    set $upstream_webui "open-webui:3000";

    # OpenClaw - Raiz
    location / {
        proxy_pass http://$upstream_openclaw;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Ollama API - acesso direto (sem rota)
    # Acesse direto: http://localhost:11434
    location /api/ollama/ {
        proxy_pass http://$upstream_ollama/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Open-WebUI - acesso via /webui
    location /webui/ {
        proxy_pass http://$upstream_webui/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

