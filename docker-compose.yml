services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    image: openclaw:${OPENCLAW_VERSION:-latest}
    container_name: openclaw
    restart: unless-stopped
    networks:
      - openclaw-net
    ports:
      - "18790:18790"
    environment:
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}
      - OPENCLAW_HOME=/home/openclaw
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-ollama/qwen3.5}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - OPENCLAW_PORT=${OPENCLAW_PORT:-18790}
      - GATEWAY_BIND=${GATEWAY_BIND:-0.0.0.0}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NVAPI_API_KEY=${NVAPI_API_KEY}
      - MULTIAGENT_MODE=enabled
      - AGENT_ISOLATION=workspace
      - ROUTING_STRATEGY=skill-based
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
      - OPENCLAW_CONTAINER_HINT=docker
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - OBSIDIAN_VAULT_PATH=/home/openclaw/obsidian
      - VAULT_ROOT=/home/openclaw/obsidian/Knowledge
    volumes:
      - ./data/.openclaw:/home/openclaw/.openclaw
      - ./logs:/home/openclaw/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Obsidian Vault (leitura/escrita para o plugin memory-wiki)
      - E:/obsidian/OpenClaw:/home/openclaw/obsidian:rw
    group_add:
      - "1001"
    depends_on:
      nginx:
        condition: service_started
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18790/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: openclaw-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_CONTEXT_LENGTH=32768
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MAX_QUEUE=5
      - OLLAMA_NUM_GPU=1
      - OLLAMA_KEEP_ALIVE=5m
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - openclaw-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 10G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  hermes:
    image: ubuntu:24.04
    container_name: hermes
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - openclaw-net
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - TZ=America/Sao_Paulo
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - ./hermes_data:/root/.hermes
    command: >
      bash -lc "
      apt-get update &&
      apt-get install -y curl bash ca-certificates &&
      curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash &&
      tail -f /dev/null
      "

networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  ollama_data:
