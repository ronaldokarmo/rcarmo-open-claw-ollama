# ──────────────────────────────────────────────────────────────
# OpenClaw - Docker Compose Otimizado para Produção
# ──────────────────────────────────────────────────────────────
# Build: Multi-stage com redução de ~70% no tamanho da imagem
# Recursos: Limitação de memória agressiva com fallback
# Segurança: Usuário não-root, network segmentation
# Performance: Configurações de CPU/memory otimizadas
# ──────────────────────────────────────────────────────────────

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    image: openclaw:${OPENCLAW_VERSION:-latest}
    container_name: openclaw
    restart: unless-stopped
    networks:
      - openclaw-net
    ports:
      - "18790:18790"
    environment:
      # Chaves de API (se aplicável)
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      # Ollama (LLM local)
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
      - OLLAMA_BASE_URL=${OLLAMA_API_BASE:-http://ollama:11434}
      - OLLAMA_HOST=${OLLAMA_API_BASE:-http://ollama:11434}
      - OLLAMA_URL=${OLLAMA_API_BASE:-http://ollama:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}
      # Configurações do OpenClaw
      - OPENCLAW_HOME=/home/openclaw
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-ollama/qwen3.5}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - OPENCLAW_PORT=${OPENCLAW_PORT:-18790}
      - GATEWAY_BIND=${GATEWAY_BIND:-0.0.0.0}
      # Telegram (se aplicável)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # API NVAPI (se aplicável)
      - NVAPI_API_KEY=${NVAPI_API_KEY}
      # Multi-agent mode
      - MULTIAGENT_MODE=enabled
      # Isolation de workspace
      - AGENT_ISOLATION=workspace
      # Routing strategy
      - ROUTING_STRATEGY=skill-based
      # Logging
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
      # Container hint para docker
      - OPENCLAW_CONTAINER_HINT=docker
      # DNS
      - NODE_OPTIONS=--dns-result-order=ipv4first
      # Obsidian
      - OBSIDIAN_VAULT_PATH=/home/openclaw/obsidian
      - VAULT_ROOT=/home/openclaw/obsidian/Knowledge
      # Recursos otimizados
      - OPENCLAW_MEMORY_LIMIT=2G
      - OPENCLAW_MEMORY_RESERVATION=1G
      - OPENCLAW_CPU_LIMIT=4
      - OPENCLAW_CPU_RESERVATION=2
    volumes:
      # Persistência de dados
      - ./data/.openclaw:/home/openclaw/.openclaw
      # Sobreposição do diretório de deps com um volume nativo Docker para evitar erros de EPERM no Windows
      - openclaw_plugin_deps:/home/openclaw/.openclaw/plugin-runtime-deps
      - ./logs:/home/openclaw/logs
      # Permite aos agents interagirem com o Docker local
      - /var/run/docker.sock:/var/run/docker.sock
      # Ollama (se usar localmente)
      # - ./ollama_data:/root/.ollama:ro
      # Obsidian Vault (leitura/escrita) - Caminho configurado via .env (OBSIDIAN_VAULT_HOST)
      - ${OBSIDIAN_VAULT_HOST}:/home/openclaw/obsidian:rw
    group_add:
      - "1000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    healthcheck:
      test: [ "CMD", "netstat", "-tln", "|", "grep", ":18790" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: openclaw-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - openclaw-net
    depends_on:
      - openclaw
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 50M
        reservations:
          memory: 25M

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_CONTEXT_LENGTH=32768
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_MAX_QUEUE=5
      - OLLAMA_KEEP_ALIVE=5m
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - openclaw-net
    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 4G
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    container_name: hermes
    restart: unless-stopped
    networks:
      - openclaw-net
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - TZ=America/Sao_Paulo
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - DEBIAN_FRONTEND=noninteractive
    volumes:
      - ./hermes_data:/root/.hermes:delegated
    command: >
      tail -f /dev/null

  prometheus:
    image: prom/prometheus:latest
    container_name: openclaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - openclaw-net
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: openclaw-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changemeplease}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - openclaw-net
    depends_on:
      - prometheus

networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  ollama_data:
  obsidian_data:
  prometheus_data:
  grafana_data:
  openclaw_plugin_deps:
