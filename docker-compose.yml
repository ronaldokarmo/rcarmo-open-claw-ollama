services:
  openclaw:
    build: .
    image: openclaw:latest
    container_name: openclaw
    restart: always
    networks:
      - openclaw-net
    ports:
      - "18790:18790"
    # user: "1000:1000" # Removido para permitir que o entrypoint corrija permissões como root
    environment:
      - GOOGLE_AI_KEY=${GOOGLE_AI_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-ollama-local}
      - OPENCLAW_HOME=/home/openclaw
      - OPENCLAW_MODEL=${OPENCLAW_MODEL:-ollama/qwen2.5:1.5b}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - OPENCLAW_PORT=${OPENCLAW_PORT:-18790}
      - GATEWAY_BIND=${GATEWAY_BIND:-0.0.0.0}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MULTIAGENT_MODE=enabled
      - AGENT_ISOLATION=workspace
      - ROUTING_STRATEGY=skill-based
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
      - NODE_OPTIONS=--dns-result-order=ipv4first
    volumes:
      - ./data/.openclaw:/home/openclaw/.openclaw
      - ./logs:/home/openclaw/logs
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "1001"
    depends_on:
      nginx:
        condition: service_started
      ollama:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:18790/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: openclaw-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - openclaw-net
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # ========================================
      # OTIMIZADO PARA 11GB RAM DISPONÍVEL
      # ========================================
      - OLLAMA_CONTEXT_LENGTH=8192 # Suficiente para modelos menores nos modelos
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=1 # Apenas 1 requisição simultânea
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_MAX_LOADED_MODELS=1 # Apenas 1 modelo na memória
      - OLLAMA_MAX_QUEUE=5 # Fila reduzida
      - OLLAMA_NUM_GPU=1
      - OLLAMA_KEEP_ALIVE=5m # Descarrega modelos inativos após 5min

    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - openclaw-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
        limits:
          memory: 8G # Reduzido - usando modelos menores como padrão
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:11434/" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  ollama_data:
