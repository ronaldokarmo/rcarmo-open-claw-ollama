version: '3.8'

services:
  openclaw:
    build: .
    container_name: openclaw
    user: "1000:1000"
    restart: unless-stopped
    # Importante: O OpenClaw "pega emprestada" a rede do Nginx para resolver o bloqueio de 127.0.0.1
    network_mode: "service:nginx"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_MODEL=gemini-2.0-flash
      - LOG_LEVEL=INFO
      - TZ=America/Sao_Paulo
      - OPENCLAW_HOME=/home/openclaw/.config/openclaw
    volumes:
      - ./data:/home/openclaw/.config/openclaw
      - ./logs:/home/openclaw/logs
      - ./config/custom-config.yaml:/home/openclaw/.config/openclaw/custom-config.yaml:ro

  nginx:
    image: nginx:alpine
    container_name: openclaw-proxy
    restart: unless-stopped
    ports:
      - "80:80" # Acesso via http://localhost
      - "18790:18789" # Acesso direto via porta do OpenClaw
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # Criamos uma rede apenas para o Nginx já que o OpenClaw está em network_mode
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
