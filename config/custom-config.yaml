# OpenClaw Custom Configuration
# Suporta: OpenRouter, Gemini, Ollama (Local)

# Modelos disponíveis
agents:
  defaults:
    # Modelo padrão: OpenRouter (mais flexível e com melhor custo)
    model: "ollama/llama3.1-fast"
    models:
      - "openrouter/qwen/qwen3-4b:free"
      - "openrouter/openai/gpt-oss-120b:free"
      - "openrouter/openai/gpt-oss-20b:free"
      - "openrouter/nvidia/nemotron-3-nano-30b-a3b:free"
      - "openrouter/nvidia/nemotron-nano-12b-v2-vl:free"
      - "openrouter/nvidia/nemotron-nano-9b-v2:free"
      - "google/gemini-3-pro-preview"
      - "openrouter/upstage/solar-pro-3:free"
      - "openrouter/stepfun/step-3.5-flash:free"
      - "openrouter/mistralai/mistral-small-3.1-24b-instruct:free"
      - "openrouter/google/gemma-3-27b-it:free"
      - "openrouter/z-ai/glm-4.5-air:free"
      - "openrouter/z-ai/glm-4.7-flash"
      - "groq/llama-3.3-70b-versatile"
      - "ollama/llama3.1-fast"
      - "ollama/qwen2.5:7b"
      - "ollama/qwen2.5:3b"
      - "ollama/llama3.1:8b"
      - "ollama/llama3:8b"
      - "ollama/mistral"
      - "ollama/deepseek-coder"

# Provider-specific model definitions
models:
  providers:
    ollama:
      baseUrl: "http://ollama:11434"
      apiKey: "ollama-local"
      api: "ollama"
      models:
        - id: "llama3.1-fast"
          name: "Llama 3.1 8B (Fast 16K)"
          contextWindow: 16384
          maxTokens: 4096
        - id: "qwen2.5:7b"
          name: "Qwen 2.5 7B"
          contextWindow: 16384
          maxTokens: 4096
        - id: "qwen2.5:3b"
          name: "Qwen 2.5 3B"
          contextWindow: 16384
          maxTokens: 4096
        - id: "llama3.1:8b"
          name: "Llama 3.1 8B"
          contextWindow: 16384
          maxTokens: 4096
        - id: "llama3:8b"
          name: "Llama 3 8B"
          contextWindow: 16384
          maxTokens: 4096

# OpenClaw Custom Configuration
# Suporta: OpenRouter, Gemini, Ollama (Local)

# Logging configuration
logging:
  level: "INFO"
