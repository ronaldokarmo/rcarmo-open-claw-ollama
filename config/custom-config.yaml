# OpenClaw Custom Configuration
# Apenas Ollama (Local) — Sem dependência de serviços externos
# Última revisão: 2026-02-24

agents:
  defaults:
    model:
      # Modelo primário: local, sem custo, privado
      primary: "ollama/llama3.2:latest"
      fallbacks:
        - "ollama/llama3.1-fast:latest"

    imageModel:
      # Modelos Llama não geram imagens — desabilitar evita erros silenciosos
      primary: "ollama/llama3.2:latest"
      fallbacks:
        - "ollama/llama3.1-fast:latest"

    models:
      ollama/llama3.2:latest:
        alias: "llama3"
      ollama/llama3.1-fast:latest:
        alias: "llama3-fast"

    compaction:
      mode: "safeguard"

    heartbeat:
      every: "20m"
      model: "ollama/llama3.2:latest"
      target: "last"

    maxConcurrent: 4
    subagents:
      maxConcurrent: 4
      archiveAfterMinutes: 30
      model: "ollama/llama3.2:latest"

# Provider-specific model definitions
models:
  providers:
    ollama:
      # Fallback para http://ollama:11434 se a variável não estiver definida
      baseUrl: "${OLLAMA_API_BASE:-http://ollama:11434}"
      apiKey: "${OLLAMA_API_KEY:-ollama-local}"
      api: "ollama"
      models:
        - id: "llama3.2:latest"
          name: "Llama 3.2 8B"
          contextWindow: 32768
          maxTokens: 4096
        - id: "llama3.1-fast:latest"
          name: "Llama 3.1 8B (Fast)"
          contextWindow: 32768
          maxTokens: 4096

# Logging configuration
logging:
  level: "INFO"
