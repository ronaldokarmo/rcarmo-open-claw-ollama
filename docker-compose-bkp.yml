version: '3.8'

services:
  # Ollama - LLM Backend
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - openclaw-net
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  # OpenClaw - Main Application
  openclaw:
    build: .
    container_name: openclaw
    user: "1000:1000"
    restart: unless-stopped
    # Compartilha rede com Nginx para resolver localhost
    network_mode: "service:nginx"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_MODEL=gemini-2.0-flash
      - LOG_LEVEL=INFO
      - TZ=America/Sao_Paulo
      - OPENCLAW_HOME=/home/openclaw/.config/openclaw
    volumes:
      - ./data:/home/openclaw/.config/openclaw
      - ./logs:/home/openclaw/logs
      - ./config/custom-config.yaml:/home/openclaw/.config/openclaw/custom-config.yaml:ro
    depends_on:
      nginx:
        condition: service_started
      ollama:
        condition: service_started

  # Nginx - Reverse Proxy (IMPORTANTE: Está na rede, não em network_mode)
  nginx:
    image: nginx:alpine
    container_name: openclaw-proxy
    restart: unless-stopped
    ports:
      - "80:80" # OpenClaw via HTTP
      - "18790:18789" # OpenClaw direto
      - "443:443" # HTTPS
      - "3000:3000" # Open-WebUI
      - "11434:11434" # Ollama API direto
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - openclaw-net
    depends_on:
      ollama:
        condition: service_started

  # Open-WebUI (opcional) - Interface para Ollama
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    # Acesso via Nginx proxy ou porta 3000
    networks:
      - openclaw-net

volumes:
  ollama_data:
  open_webui_data:


networks:
  openclaw-net:
    driver: bridge
